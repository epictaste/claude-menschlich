<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" font-family="Helvetica, Arial, sans-serif">
  <rect width="1200" height="420" fill="#E9E2D5"/>
  <rect width="1200" height="10" y="410" fill="#C2410C"/>

  <!-- Linke Spalte: Titel -->
  <text x="72" y="150" font-size="94" font-weight="800" fill="#213A2C" letter-spacing="-2">menschlich</text>
  <text x="76" y="205" font-size="30" font-weight="500" fill="#3B5545">Nimmt den KI-Klang aus deinem Deutsch.</text>
  <text x="76" y="250" font-size="20" font-weight="500" fill="#8A6A52">claude-menschlich &#183; Agent Skill f&#252;r Claude Code, Codex &amp; Cursor</text>

  <!-- Fußzeile links -->
  <text x="76" y="360" font-size="19" fill="#5A6B60">Em&#8209;Dashes &#183; &#8222;nicht X, sondern Y&#8220; &#183; Dreier&#8209;Listen &#183; Floskeln &#8594; raus</text>

  <!-- Rechte Spalte: durchgestrichene Slop-Chips -->
  <g transform="translate(792,86)">
    <rect x="0" y="0" width="330" height="56" rx="12" fill="#F4EFE6" stroke="#D8CDB8"/>
    <text x="24" y="36" font-size="26" font-weight="700" fill="#B14a2a">&#8212;</text>
    <text x="60" y="35" font-size="20" fill="#6B7A70">dramatischer Gedankenstrich</text>
    <line x1="16" y1="28" x2="314" y2="28" stroke="#C2410C" stroke-width="3"/>

    <rect x="0" y="72" width="330" height="56" rx="12" fill="#F4EFE6" stroke="#D8CDB8"/>
    <text x="24" y="107" font-size="20" fill="#6B7A70">nicht X, sondern Y</text>
    <line x1="16" y1="100" x2="314" y2="100" stroke="#C2410C" stroke-width="3"/>

    <rect x="0" y="144" width="330" height="56" rx="12" fill="#F4EFE6" stroke="#D8CDB8"/>
    <text x="24" y="179" font-size="20" fill="#6B7A70">filtern, testen, zeigen</text>
    <line x1="16" y1="172" x2="314" y2="172" stroke="#C2410C" stroke-width="3"/>

    <rect x="0" y="216" width="330" height="56" rx="12" fill="#213A2C"/>
    <text x="24" y="251" font-size="20" font-weight="600" fill="#EDE6D8">klingt wie ein Mensch &#10003;</text>
  </g>
</svg>
